services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - backend-data:/app/data
    environment:
      - DATA_DIR=/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped

  e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    depends_on:
      - frontend
    volumes:
      - ./test_data:/test_data:ro
    environment:
      - BASE_URL=http://frontend:5173
    profiles:
      - test

volumes:
  backend-data:
